name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PACKAGE: calendar-slots
  TEST_USER_LOGIN: user@tinycld.org
  TEST_USER_PW: TestUser1234!
  ADMIN_USER_LOGIN: admin@tinycld.org
  ADMIN_USER_PW: AdminPass1234!

jobs:
  check:
    name: Typecheck & Unit
    runs-on: ubuntu-latest
    steps:
      # 1. The workspace meta-repo becomes the job root.
      - uses: actions/checkout@v5
        with:
          repository: tinycld/workspace
          ref: main
          path: ws
      # 2. This PR's code, checked out into the member slot.
      - uses: actions/checkout@v5
        with:
          path: ws/${{ env.PACKAGE }}
      - uses: actions/setup-node@v5
        with:
          node-version-file: ws/.node-version
          cache: npm
          cache-dependency-path: ws/package-lock.json
      - uses: actions/setup-go@v6
        with:
          go-version-file: ws/.go-version
      # 3. Clone app + core (bootstrap --tooling skips dirs that already exist).
      - name: Assemble workspace (app + core)
        working-directory: ws
        run: TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --tooling
      # 4. Install without running postinstall so we can link the package first.
      #    The workspace package-lock.json predates this external package, so npm
      #    won't create its node_modules symlink before the generator runs.
      - name: Install (workspace root, skip scripts)
        working-directory: ws
        run: npm install --ignore-scripts
      # 5. Symlink the package so the generator can resolve it via node_modules.
      - name: Link package into node_modules
        working-directory: ws
        run: mkdir -p node_modules/@tinycld && ln -sf "$(realpath ${{ env.PACKAGE }})" node_modules/@tinycld/${{ env.PACKAGE }}
      # 6. Run the postinstall steps manually now that the symlink exists.
      - name: Generate packages
        working-directory: ws/app
        run: npm run packages:generate
      - name: Copy assets
        working-directory: ws/app
        run: npm run assets:copy-pdfjs
      - name: Typecheck + unit
        working-directory: ws/${{ env.PACKAGE }}
        run: npx tinycld-pkg check

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: tinycld/workspace
          ref: main
          path: ws
      - uses: actions/checkout@v5
        with:
          path: ws/${{ env.PACKAGE }}
      - uses: actions/setup-node@v5
        with:
          node-version-file: ws/.node-version
          cache: npm
          cache-dependency-path: ws/package-lock.json
      - uses: actions/setup-go@v6
        with:
          go-version-file: ws/.go-version
      - name: Assemble workspace (app + core)
        working-directory: ws
        run: TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --tooling
      - name: Install (workspace root, skip scripts)
        working-directory: ws
        run: npm install --ignore-scripts
      - name: Link package into node_modules
        working-directory: ws
        run: mkdir -p node_modules/@tinycld && ln -sf "$(realpath ${{ env.PACKAGE }})" node_modules/@tinycld/${{ env.PACKAGE }}
      - name: Generate packages
        working-directory: ws/app
        run: npm run packages:generate
      - name: Copy assets
        working-directory: ws/app
        run: npm run assets:copy-pdfjs
      - name: Install Playwright browsers
        working-directory: ws/app
        run: npx playwright install --with-deps chromium
      - name: E2E
        working-directory: ws/${{ env.PACKAGE }}
        run: npx tinycld-pkg test:e2e
